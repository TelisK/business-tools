{% extends 'income_expenses/base.html' %}
{% block body %}

<div class="page-header">
    <div>
        <h1>{% if form.instance.pk %}Επεξεργασία Καταστήματος{% else %}Νέο Κατάστημα{% endif %}</h1>
    </div>
    <a href="{% url 'income_expenses:stores' %}" class="btn btn-secondary">← Πίσω</a>
</div>
{% if form.errors %}
    <div style="color:var(--expense); font-size:0.875rem; margin-bottom:1rem;">
        {{ form.errors }}
    </div>
{% endif %}
<div class="form-card">
    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-group full">
                <label>Όνομα Καταστήματος</label>
                {{ form.name }}
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Αποθήκευση</button>
            <a href="{% url 'income_expenses:stores' %}" class="btn btn-secondary">Ακύρωση</a>
        </div>
    </form>
</div>

{% endblock %}
