{% extends 'income_expenses/base.html' %}
{% block body %}

<div class="form-card" style="max-width:400px; margin:4rem auto;">
    <h1 style="font-size:1.4rem; margin-bottom:1.5rem;">Επαναφορά κωδικού</h1>
    <form method="post">

        {% csrf_token %}
        {% for field in form %}
        <div class="form-grid">
            <div class="form-group full">
            <label for="">{{ field.label }}</label>
            {{ field }}
            </div>

        </div>
        {% endfor %}

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Αποστολή</button>
        </div>

    </form>
</div>

{% endblock %}
