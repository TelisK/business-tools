server {
    listen 80;

    location /static/ {
        alias /app/static/;
    }

    location /melody/ {
        proxy_pass http://web:8000/melody/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}