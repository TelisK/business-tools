<form method="POST" action="{% url 'invoices:invoice_supplier' %}">
    {% csrf_token %}
    
    <label for="supplier_select">Επιλογή προμηθευτή</label>
    <select name="supplier_select" id="supplier_select">

    <button type="submit">Επιλογή</button>

</form>
{% else %}

        <td>Δέν υπάρχουν καταχωρημένα τιμολόγια</td>
    </tr>
{% endif %}
