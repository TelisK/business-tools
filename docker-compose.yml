services:
  web:
    build: .
    restart: always
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./static:/app/static
    env_file:
      - .env
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/static
    depends_on:
      - web