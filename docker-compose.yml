services:
  web:
    build: .
    restart: always
    command: >
      sh -c "python manage.py collectstatic --noinput &&
         python manage.py migrate &&
         gunicorn business_tools.wsgi:application --bind 0.0.0.0:8000 --access-logfile - --error-logfile -"
    volumes:
      - db_data:/app/db_data
      - ./static:/app/static
    env_file:
      - .env
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/static
    depends_on:
      - web

volumes:
  db_data: