services:
  web:
    build: .
    restart: always
    command: >
      sh -c "python manage.py collectstatic --noinput &&
         python manage.py migrate &&
         gunicorn business_tools.wsgi:application --bind 0.0.0.0:8000 --access-logfile - --error-logfile -"
    volumes:
      - ./static:/app/static
      - backups:/backups
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      - db

  db:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env


  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/static
    depends_on:
      - web

volumes:
  postgres_data:
  backups: